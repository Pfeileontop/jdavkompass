{% extends "base_intern.html" %}

{% block title %}Profil - JDAV Hildesheim{% endblock %}

{% block content %}
<section class="page-section">
    <h1>Mein Profil</h1>

    <div class="profile-info">
        <p><strong>Benutzername:</strong> {{ user[1] }}</p>
    </div>

    <div class="form-card">
        <form method="POST" action="{{ url_for('profile.profile') }}">

            <div class="form-section">
                <h3>Passwort ändern</h3>

                {% if success %}
                <p class="success">{{ success }}</p>
                {% endif %}

                {% if error %}
                <p class="error">{{ error }}</p>
                {% endif %}

                <div class="form-grid">

                    <div class="form-group">
                        <label for="old_password">Altes Passwort</label>
                        <input type="password" name="old_password" id="old_password" required>
                    </div>

                    <div class="form-group">
                        <label for="new_password">Neues Passwort</label>
                        <input 
                            type="password"
                            name="new_password"
                            id="new_password"
                            placeholder="Passwort"
                            required
                            minlength="8"
                            pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d).+"
                            title="Mindestens 8 Zeichen: Großbuchstaben, Kleinbuchstaben und Zahlen">
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Neues Passwort bestätigen</label>
                        <input type="password" name="confirm_password" id="confirm_password" required>
                    </div>

                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Passwort ändern</button>
            </div>

        </form>
    </div>
</section>
{% endblock %}
